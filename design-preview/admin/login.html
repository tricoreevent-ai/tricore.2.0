<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TriCore Admin — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <a href="index.html" class="back-to-hub" style="position:fixed;top:0;left:0;z-index:100;margin:16px"><i data-lucide="arrow-left"></i> ADMIN HUB</a>

  <div class="login-page">
    <div class="login-left">
      <div class="login-left-bg"></div>
      <div class="login-left-overlay"></div>
      <div class="login-left-content">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="logo-mark" style="width:40px;height:40px">
            <svg width="22" height="20" viewBox="0 0 22 20" fill="currentColor"><polygon points="11,0 22,20 0,20"/></svg>
          </div>
          <span style="font-size:28px;font-weight:800;letter-spacing:4px">TRICORE</span>
        </div>
        <h1>MANAGE YOUR<br>EVENTS PLATFORM</h1>
        <div class="accent-line"></div>
        <p style="font-size:16px;line-height:1.6;color:var(--muted)">Control every aspect of your public website,<br>events, and content from one powerful dashboard.</p>
      </div>
    </div>
    <div class="login-right">
      <div class="login-form">
        <h2>ADMIN LOGIN</h2>
        <p class="subtitle">Sign in to access the admin portal</p>
        <div class="form-group">
          <label class="form-label">EMAIL</label>
          <input class="form-input" placeholder="admin@tricoreevents.com">
        </div>
        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <div class="input-wrapper">
            <input type="password" class="form-input" placeholder="••••••••••">
            <i data-lucide="eye-off" class="eye" style="width:18px;height:18px"></i>
          </div>
        </div>
        <button class="btn-gold-lg">SIGN IN <i data-lucide="arrow-right" style="width:18px;height:18px"></i></button>
        <a href="#" class="forgot">Forgot your password?</a>
      </div>
    </div>
  </div>

<script>lucide.createIcons();</script>
</body>
</html>
